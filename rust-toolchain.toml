# Pin the MSVC host channel so a fresh checkout cannot silently use the GNU host.
# The `stable` channel intentionally floats to pick up compiler fixes; Cargo.lock
# keeps dependencies reproducible and Cargo.toml's `rust-version` records the true
# minimum compiler. The build/install scripts plus .cargo/config.toml assume the
# MSVC layout. Verify the resolved version with `rustup show`.
[toolchain]
channel = "stable-x86_64-pc-windows-msvc"
# Travel with the repo so a fresh checkout (and CI) has the lint/format tools.
components = ["clippy", "rustfmt"]

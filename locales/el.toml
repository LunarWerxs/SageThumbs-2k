tip_custom_action = "Τι κάνει το επιπλέον γρήγορο πλήκτρο — λήψη στιγμιοτύπου, επιλογή χρώματος, αντιγραφή κειμένου (OCR), μεταφόρτωση, μετατροπή και άλλα."
tip_custom_action_hk = "Ο καθολικός συνδυασμός πλήκτρων που ενεργοποιεί την επιλεγμένη σας ενέργεια. Το \"(καμία)\" την αφήνει χωρίς σύνδεση."
tip_menu_items = "Επιλέξτε τις καταχωρίσεις που θέλετε στο μενού δεξιού κλικ· σύρετε γραμμές — και διαχωριστικά — για αναδιάταξη. Το μενού ακολουθεί αυτή τη λίστα από πάνω προς τα κάτω."

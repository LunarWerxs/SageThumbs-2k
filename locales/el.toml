tip_verbose_log = "Γράφει επίσης λεπτομερή βήμα-προς-βήμα ίχνη στο αρχείο καταγραφής. Ενεργοποιήστε το όταν διερευνάτε ένα πρόβλημα· αφήστε το απενεργοποιημένο καθημερινά."

# Settings control tooltips (hover hints — every control gets one)
tip_enable_thumbs = "Show thumbnails in Explorer for the file types ticked on the right."
tip_prefer_embedded = "When a file carries its own preview (RAW, PSD, ebooks…), use that instead of rendering it — faster, sometimes lower-res."
tip_enable_menu = "Add the SageThumbs 2K submenu (Convert, Resize, Rotate, Tools…) to the right-click menu."
tip_menu_preview = "Where the image preview shows in the right-click menu: off, at the top of the SageThumbs submenu, or directly on the main menu."
tip_menu_quick = "Also put Convert, Resize and Rotate on the main right-click menu — not just inside the submenu."
tip_menu_checker = "Draw a subtle checkerboard behind see-through areas of the menu preview, so transparent images don't disappear into the background."
tip_max_file = "Skip files bigger than this (MB) so huge files don't slow Explorer down."
tip_max_thumb = "Largest thumbnail Explorer will ask us to draw, in pixels."
tip_jpeg = "JPEG quality for thumbnails and Convert → JPG (0–100). Higher looks better but is bigger."
tip_png = "PNG compression for Convert → PNG (0–9). Higher saves space but is slower to write."
tip_sort = "Put the archive's inner pages in number order (so page 2 comes before page 10, not after) before picking the cover."
tip_prefer_cover = "Prefer a page named \"cover\" over the first page when one exists."
tip_skip_scan = "\"Scanlation\" = a comic/manga that fans scanned and translated themselves. Those usually open with the translation group's logo or a credits page — skip them so the thumbnail is the real cover."
tip_lang = "Interface language. \"System default\" follows your Windows display language."
tip_screenshot = "Run a small background helper so a hotkey snaps a screen region you can draw on, copy, save, pin, or upload. Off by default — nothing runs in the background until you enable it."
tip_shot_hotkey = "The global key combo that starts a capture while the helper is enabled."
tip_instant_screenshot = "Turn on a second hotkey that instantly copies the whole screen to your clipboard and saves a PNG to your save folder (the Desktop if you haven't set one), with no editor."
tip_shot_quick_hotkey = "The key combo for the instant full-screen quick-save (only used while the instant screenshot is enabled)."
tip_select_all = "Tick every file type."
tip_clear_all = "Untick every file type."
tip_defaults = "Reset the file-type ticks to the recommended set."
tip_list = "Tick the formats SageThumbs should thumbnail. Press Space to toggle the selected rows."
tip_about = "Version, credits and links."
tip_save = "Apply your changes and keep this window open."
tip_cancel = "Close Settings without applying unsaved changes."
tip_banner = "See what else Lunarwerx makes."
tip_shot_use_dir = "Ctrl+S in the capture editor saves straight to your chosen folder — no Save-As prompt. Turn off to be asked where to save each time."
tip_shot_set_dir = "Pick the folder Ctrl+S screenshots go to. Until you set one, they land on the Desktop."
tip_edit_upload_hosts = "Open the upload-hosts list in your text editor. \"Upload (copy link)\" tries these keyless image hosts in order — add, remove or reorder them there."
tip_shot_restart = "Start (or restart) the background helper that owns the global hotkeys. Click this if a hotkey stops responding."
tip_hide_tray = "Run the hotkey helper without a tray icon. Hotkeys keep working — there's just no icon in the notification area."
tip_custom_action_enable = "Add one extra global hotkey bound to an action of your choice — pick the action and its key combo below."
tip_custom_action = "What the extra hotkey does — take a screenshot, pick a colour, copy text (OCR), upload, convert and more."
tip_custom_action_hk = "The global key combo that fires your chosen action. \"(none)\" leaves it unbound."
tip_menu_items = "Tick the entries you want in the right-click menu; drag rows — dividers too — to reorder. The menu follows this list top to bottom."
tip_menu_reset = "Put the menu entries and dividers back in their original order. Doesn't change which entries are ticked."
tip_verbose_log = "Also write detailed step-by-step traces to the log. Turn on when chasing a problem; leave off day to day."
tip_open_log = "Open the diagnostics log — errors and crashes are recorded there. Send it along when reporting a bug."
tip_rebuild_cache = "Clear Windows' thumbnail cache and restart Explorer so every thumbnail redraws fresh — the fix when thumbnails look stale after a settings change."
tip_repair_assoc = "Re-register SageThumbs for every enabled format, then rebuild the thumbnail cache — the fix when another app has taken over your thumbnails."
tip_update_auto = "Quietly check GitHub for a newer version once in a while (while the hotkey helper is running) and let you know. Nothing installs by itself."
tip_check_updates = "Ask GitHub right now whether a newer version is available."
tip_reset_all = "Set every option in this window back to factory defaults. Nothing is saved until you click Save."
tip_import = "Load settings from a previously exported .json file and apply them."
tip_export = "Save all current settings to a .json file — a backup you can import here or on another PC."


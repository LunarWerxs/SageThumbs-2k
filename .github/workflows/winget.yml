# Auto-publish each GitHub release to the Windows Package Manager (winget).
#
# How it works: when a release is *published* (not draft/pre-release), this submits a
# pull request to microsoft/winget-pkgs with an updated manifest pointing at the new
# installer asset. Set up once → zero ongoing work.
#
# One-time setup (owner): create a CLASSIC GitHub PAT with `public_repo` scope and add it
# as a repo secret named WINGET_TOKEN (Settings → Secrets and variables → Actions).
# The FIRST package submission is done by hand with Komac (the action is for updates);
# every release after that is automatic via this workflow.
name: Publish to winget

on:
  release:
    types: [released] # published, non-prerelease
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to (re)publish, e.g. v0.4.9
        required: true

jobs:
  winget:
    runs-on: windows-latest
    steps:
      # winget-releaser can only UPDATE a package that already exists in winget-pkgs; the
      # FIRST version must be merged by hand (Microsoft review). Until that lands, skip
      # gracefully instead of failing every release. Once the package exists, this passes
      # through and auto-publishes with zero changes. Manifests live at
      # manifests/<first-letter-lowercased>/<Publisher>/<Package>/.
      - name: Check the package is onboarded to winget-pkgs
        id: onboarded
        shell: bash
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.WINGET_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/l/LunarWerxs/SageThumbs2K")
          if [ "$code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=winget skipped::LunarWerxs.SageThumbs2K not yet in winget-pkgs (HTTP $code) — auto-publish resumes once the first submission is merged."
          fi

      - name: Submit to winget-pkgs
        if: steps.onboarded.outputs.exists == 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          # winget package identifier: Publisher.Package (PascalCase, no spaces).
          identifier: LunarWerxs.SageThumbs2K
          # Match the installer asset on the release (SageThumbs2K-Setup-<ver>.exe).
          installers-regex: 'SageThumbs2K-Setup-.*\.exe$'
          release-tag: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}

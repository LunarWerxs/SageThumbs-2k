name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads the checkout and public dependency metadata.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build · clippy · test (windows-msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # rust-toolchain.toml pins stable-x86_64-pc-windows-msvc + clippy/rustfmt,
      # which rustup installs on first cargo invocation. No setup action needed.
      - name: Toolchain
        run: rustup show

      # Swatinem/rust-cache keys on the rustc version + Cargo.lock + job AND prunes
      # stale build artifacts before saving. The old hashFiles(Cargo.lock)-only
      # actions/cache did neither: it restored a wholesale `target/` across commits
      # (same key when Cargo.lock is unchanged), which accumulated into an intermittent
      # release-LTO link error ("unresolved external symbol core::panicking::assert_failed").
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # RAR/CBR is the pure-Rust `rars` crate (always on, no feature gate), so this
      # default build already covers it — the whole dependency graph is permissive.
      - name: Build
        run: cargo build --release

      # Integration tests (tests/) drive the built shell-extension DLL in-process the
      # way Explorer does: the COM thumbnail handshake (com_roundtrip) and the
      # IExplorerCommand verb flyout + invoke (explorer_command). They LoadLibrary the
      # cdylib from the target dir and link `sagethumbs2k_core`, and run
      # headless (no registration, no admin, no Explorer). `settings_gate` redirects
      # HKCU into a scratch hive and runs here; only the live packaged-registration
      # test is #[ignore]d.
      #
      # ORDER MATTERS — `cargo test --tests` rebuilds the core rlib and test binaries,
      # but it does NOT refresh the separate `sagethumbs2k-dll` workspace member whose
      # canonical DLL these tests load. Run immediately after Build so they never test a
      # stale shell-extension DLL. (The old combined cdylib+rlib collision was removed
      # when the thin `dll/` wrapper became its own crate.)
      # Cargo's `--tests` selector runs every target with test=true in this
      # workspace: library unit tests, both binary unit-test targets, and tests/.
      # Keep the single invocation here so all of them share the freshly built DLL.
      - name: Unit and integration tests
        run: cargo test --release --tests

      # Gates on ALL clippy lints across every target (bins, lib, tests): any new
      # warning is promoted to an error and fails the build. The tree is kept
      # warning-clean; intentional exceptions carry a local #[allow] with a reason.
      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

  # Cargo.toml publishes 1.93 as the minimum supported Rust version. The main job
  # intentionally follows current stable, so exercise the lower bound separately
  # instead of letting source/API drift make the declared MSRV fictional.
  msrv:
    name: MSRV (Rust 1.93)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Rust 1.93 MSVC
        run: rustup toolchain install 1.93.0-x86_64-pc-windows-msvc --profile minimal
      - name: Check workspace at MSRV
        run: cargo +1.93.0-x86_64-pc-windows-msvc check --locked --workspace

  # Drift guard (no build needed): every asset referenced by include_bytes!/include_str!
  # or a README/docs <img> must be git-tracked; the README badge + FEATURES format count
  # must match src/formats.rs FORMATS; the AppxManifest version must match Cargo.toml.
  # Catches the "referenced-but-not-committed" + version/count drift classes that have
  # broken releases — fails fast, before anything ships. See scripts/check-consistency.ps1.
  consistency:
    name: consistency (assets · counts · version)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: check-consistency
        shell: pwsh
        run: ./scripts/check-consistency.ps1

  # License + advisory + source/ban audit. The whole dependency graph is now
  # 100% permissive (RAR/CBR via the pure-Rust `rars` crate — no proprietary
  # UnRAR anywhere), so this proves the build is license-clean. Config +
  # allowlist live in deny.toml.
  deny:
    name: cargo-deny (licenses · advisories — default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # rust-toolchain.toml pins stable-x86_64-pc-windows-msvc, which rustup can't
      # use on this Linux runner ("target triple in channel name"). cargo-deny only
      # needs `cargo metadata` (toolchain-agnostic; the windows-msvc *target* is set
      # in deny.toml), so drop the pin here and let the action's Linux toolchain run.
      - name: Drop windows-only toolchain pin (Linux runner)
        run: rm -f rust-toolchain.toml
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          # Checks the committed Cargo.lock (advisories + licenses) against
          # deny.toml's allowlist over the full (now fully-permissive) graph.
          # deny.toml lives at the repo root (cargo-deny's default location), so
          # no --config flag is needed — robust across cargo-deny versions
          # (newer cargo-deny moved --config to a global flag before `check`).
          command: check
          arguments: --locked
